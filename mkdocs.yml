site_name: Manthan
site_description: Deterministic Decision Operating System for AI
site_url: https://pavancharak.github.io/manthan-docs/

theme:
  name: material

  palette:
    scheme: default
    primary: white
    accent: indigo

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - System: system.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Research: papers.md
