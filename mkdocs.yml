site_name: Manthan
site_description: Deterministic Decision Operating System for AI
site_url: https://pavancharak.github.io/manthan-docs/

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mermaid2

markdown_extensions:
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - How It Works: how-it-works.md
  - Example Walkthrough: example.md
  - API Reference: api.md
  - Architecture: architecture.md
  - Decision Engine: decision-engine.md
  - Intelligence Layer: intelligence.md
  - Decision Graphs: graphs.md
  - Contracts: contracts.md