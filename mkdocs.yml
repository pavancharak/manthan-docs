site_name: Manthan
site_description: Deterministic Decision Operating System for AI

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Decision Engine: decision-engine.md
  - Intelligence Layer: intelligence.md
  - Decision Graphs: graphs.md
  - Contracts: contracts.md